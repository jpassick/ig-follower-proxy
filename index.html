<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IG Follower Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f7; color: #1a1a1a; padding: 2rem; }
  .container { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 0.25rem; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
  .tabs { display: flex; gap: 6px; margin-bottom: 1.5rem; }
  .tab { font-size: 13px; padding: 6px 16px; border-radius: 20px; cursor: pointer; border: 1px solid #ddd; background: transparent; color: #666; }
  .tab.active { background: #fff; color: #1a1a1a; border-color: #999; font-weight: 500; }
  .add-row { display: flex; gap: 8px; margin-bottom: 1rem; }
  .add-row input { flex: 1; font-size: 14px; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; background: #fff; }
  button { font-size: 13px; padding: 8px 16px; border-radius: 8px; border: 1px solid #ddd; background: #fff; cursor: pointer; color: #1a1a1a; }
  button:hover { background: #f0f0f0; }
  button.primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  button.primary:hover { background: #333; }
  button.danger { color: #c0392b; border-color: #f0c0bb; font-size: 12px; padding: 4px 8px; }
  button.danger:hover { background: #fdf0ee; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; font-size: 12px; color: #888; font-weight: 500; border-bottom: 1px solid #eee; padding: 6px 0; }
  td { padding: 10px 0; border-bottom: 1px solid #eee; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  .up { color: #27ae60; font-size: 12px; }
  .down { color: #c0392b; font-size: 12px; }
  .muted { color: #aaa; }
  .pill-err { background: #fdf0ee; color: #c0392b; font-size: 11px; padding: 2px 8px; border-radius: 20px; }
  .actions { display: flex; gap: 8px; margin-top: 1.25rem; flex-wrap: wrap; align-items: center; }
  .report-box { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 1.25rem; }
  .report-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .report-title { font-size: 14px; font-weight: 600; }
  .report-date { font-size: 12px; color: #888; }
  .report-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 14px; gap: 8px; }
  .report-row:last-child { border-bottom: none; }
  .err-box { background: #fdf0ee; border: 1px solid #f0c0bb; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #c0392b; margin-bottom: 10px; display: none; }
  .section-title { font-size: 14px; font-weight: 500; margin-bottom: 10px; }
  .saving { font-size: 12px; color: #888; display: none; }
</style>
</head>
<body>
<div class="container">
  <h1>Instagram Follower Tracker</h1>
  <p class="subtitle">Alamo Records roster</p>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('live')">Live lookup</button>
    <button class="tab" onclick="switchTab('report')">Weekly report</button>
  </div>
  <div id="view-live">
    <div class="section-title">Artist roster</div>
    <div class="add-row">
      <input type="text" id="add-input" placeholder="Instagram handle, e.g. rodwave" />
      <button class="primary" onclick="addHandle()">Add + fetch</button>
    </div>
    <div class="err-box" id="err-box"></div>
    <table>
      <thead><tr><th style="width:35%">Handle</th><th style="width:30%">Followers</th><th style="width:25%">vs last week</th><th style="width:10%"></th></tr></thead>
      <tbody id="roster-body"></tbody>
    </table>
    <div class="actions">
      <button onclick="refreshAll()">Refresh all</button>
      <button class="primary" onclick="saveSnapshot()">Save weekly snapshot</button>
      <span class="saving" id="saving-indicator">Saving...</span>
    </div>
  </div>
  <div id="view-report" style="display:none;">
    <div class="report-box">
      <div class="report-header">
        <div class="report-title">Weekly follower report</div>
        <div class="report-date" id="report-date"></div>
      </div>
      <div id="report-rows"><div class="muted" style="font-size:13px;">No snapshots yet.</div></div>
    </div>
    <div class="actions">
      <button onclick="exportReport()">Copy report text</button>
    </div>
  </div>
</div>
<script>
const SNAP_KEY = 'ig_snaps_v1';
let roster = [];
let snapshots = JSON.parse(localStorage.getItem(SNAP_KEY) || '[]');
function saveSnaps() { localStorage.setItem(SNAP_KEY, JSON.stringify(snapshots)); }

async function loadRoster() {
  try {
    const res = await fetch('/api/roster');
    const data = await res.json();
    roster = data.roster || [];
    renderRoster();
  } catch(e) { roster = []; renderRoster(); }
}

async function persistRoster() {
  const indicator = document.getElementById('saving-indicator');
  indicator.style.display = 'inline';
  try {
    await fetch('/api/roster', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ roster })
    });
  } catch(e) { console.error('Save failed', e); }
  indicator.style.display = 'none';
}

function fmt(n) {
  if (n == null) return '—';
  if (n >= 1000000) return (n/1000000).toFixed(2) + 'M';
  if (n >= 1000) return (n/1000).toFixed(1) + 'K';
  return Number(n).toLocaleString();
}
function pct(cur, prev) { if (!prev) return null; return (cur - prev) / prev * 100; }
function renderPct(p) {
  if (p === null) return '<span class="muted">—</span>';
  const sign = p > 0 ? '+' : '';
  const cls = p > 0 ? 'up' : p < 0 ? 'down' : 'muted';
  const arrow = p > 0 ? '▲' : p < 0 ? '▼' : '–';
  return `<span class="${cls}">${arrow} ${sign}${p.toFixed(2)}%</span>`;
}
function getLastSnap(handle) {
  for (let i = snapshots.length - 1; i >= 0; i--) {
    const e = snapshots[i].data.find(d => d.handle === handle);
    if (e) return e.followers;
  }
  return null;
}
function renderRoster() {
  const tbody = document.getElementById('roster-body');
  if (!roster.length) { tbody.innerHTML = '<tr><td colspan="4" class="muted" style="padding:12px 0;font-size:13px;">No handles added yet</td></tr>'; return; }
  tbody.innerHTML = roster.map((r, i) => {
    const prev = getLastSnap(r.handle);
    const p = (r.followers != null && prev != null) ? pct(r.followers, prev) : null;
    const fc = r.status === 'loading' ? '<span class="muted">fetching...</span>'
      : r.status === 'error' ? '<span class="pill-err">error</span>'
      : `<strong>${fmt(r.followers)}</strong>`;
    return `<tr><td>@${r.handle}</td><td>${fc}</td><td>${r.status === 'ok' ? renderPct(p) : '<span class="muted">—</span>'}</td><td style="text-align:right"><button class="danger" onclick="removeHandle(${i})">✕</button></td></tr>`;
  }).join('');
}
async function fetchFollowers(handle) {
  const res = await fetch(`/api/followers?username=${encodeURIComponent(handle)}`);
  if (!res.ok) throw new Error(`Server error ${res.status}`);
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  if (data.follower_count == null) throw new Error('No count returned');
  return data.follower_count;
}
function showErr(msg) {
  const el = document.getElementById('err-box');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 7000);
}
async function addHandle() {
  const input = document.getElementById('add-input');
  const handle = input.value.trim().replace('@','').toLowerCase();
  if (!handle) return;
  if (roster.find(r => r.handle === handle)) { showErr('@' + handle + ' already in roster.'); return; }
  input.value = '';
  const entry = { handle, followers: null, status: 'loading' };
  roster.push(entry); renderRoster();
  try { entry.followers = await fetchFollowers(handle); entry.status = 'ok'; }
  catch(e) { entry.status = 'error'; showErr('Error on @' + handle + ': ' + e.message); }
  renderRoster();
  await persistRoster();
}
async function removeHandle(i) {
  roster.splice(i, 1); renderRoster();
  await persistRoster();
}
async function refreshAll() {
  for (const r of roster) {
    r.status = 'loading'; renderRoster();
    try { r.followers = await fetchFollowers(r.handle); r.status = 'ok'; }
    catch(e) { r.status = 'error'; }
    renderRoster();
  }
  await persistRoster();
}
function saveSnapshot() {
  const valid = roster.filter(r => r.followers != null);
  if (!valid.length) { showErr('No data yet.'); return; }
  const snap = { date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }), ts: Date.now(), data: valid.map(r => ({ handle: r.handle, followers: r.followers })) };
  snapshots.push(snap); saveSnaps(); renderReport();
  alert('Snapshot saved — ' + snap.date);
}
function renderReport() {
  const el = document.getElementById('report-rows');
  const dateEl = document.getElementById('report-date');
  if (!snapshots.length) { el.innerHTML = '<div class="muted" style="font-size:13px;">No snapshots yet.</div>'; return; }
  const latest = snapshots[snapshots.length - 1];
  const prev = snapshots.length > 1 ? snapshots[snapshots.length - 2] : null;
  dateEl.textContent = latest.date;
  el.innerHTML = latest.data.map(d => {
    const pe = prev ? prev.data.find(p => p.handle === d.handle) : null;
    const p = pe ? pct(d.followers, pe.followers) : null;
    const diff = pe ? d.followers - pe.followers : null;
    return `<div class="report-row"><span style="min-width:130px">@${d.handle}</span><strong style="min-width:90px">${fmt(d.followers)}</strong><span>${diff !== null ? `${renderPct(p)} <span class="muted">(${diff >= 0 ? '+' : ''}${Number(diff).toLocaleString()})</span>` : '<span class="muted">first entry</span>'}</span></div>`;
  }).join('');
}
function exportReport() {
  if (!snapshots.length) { alert('No snapshot data yet.'); return; }
  const latest = snapshots[snapshots.length - 1];
  const prev = snapshots.length > 1 ? snapshots[snapshots.length - 2] : null;
  let txt = `Instagram Weekly Report — ${latest.date}\n${'─'.repeat(44)}\n`;
  latest.data.forEach(d => {
    const pe = prev ? prev.data.find(p => p.handle === d.handle) : null;
    const p = pe ? pct(d.followers, pe.followers) : null;
    const diff = pe ? d.followers - pe.followers : null;
    const ch = diff !== null ? ` | ${diff >= 0 ? '+' : ''}${Number(diff).toLocaleString()} (${p != null ? (p >= 0 ? '+' : '') + p.toFixed(2) + '%' : '—'})` : ' | first entry';
    txt += `@${d.handle}: ${fmt(d.followers)}${ch}\n`;
  });
  navigator.clipboard.writeText(txt).then(() => alert('Copied!')).catch(() => alert(txt));
}
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((el, i) => el.classList.toggle('active', ['live','report'][i] === tab));
  document.getElementById('view-live').style.display = tab === 'live' ? '' : 'none';
  document.getElementById('view-report').style.display = tab === 'report' ? '' : 'none';
  if (tab === 'report') renderReport();
}
document.getElementById('add-input').addEventListener('keydown', e => { if (e.key === 'Enter') addHandle(); });
loadRoster();
</script>
</body>
</html>
